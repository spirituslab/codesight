<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codesight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<script src="data.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: #16213e;
  border-bottom: 1px solid #2a2a4a;
  flex-shrink: 0;
  z-index: 10;
}
#breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  flex-shrink: 0;
}
#breadcrumb span { color: #8888aa; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
#breadcrumb span:hover { color: #fff; background: rgba(255,255,255,0.1); }
#breadcrumb span.active { color: #7dd3fc; cursor: default; }
#breadcrumb span.active:hover { background: none; }
#breadcrumb .sep { color: #555; cursor: default; padding: 0; }
#breadcrumb .sep:hover { background: none; }
#search-box {
  margin-left: auto;
  padding: 6px 12px;
  border: 1px solid #3a3a5a;
  border-radius: 6px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 13px;
  width: 260px;
  outline: none;
  transition: border-color 0.15s;
}
#search-box:focus { border-color: #7dd3fc; }
#search-box::placeholder { color: #666; }
#main { display: flex; flex: 1; overflow: hidden; }
#sidebar {
  width: 360px;
  background: #16213e;
  border-right: 1px solid #2a2a4a;
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px;
}
#sidebar::-webkit-scrollbar { width: 6px; }
#sidebar::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
#sidebar h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: #fff; }
#sidebar .subtitle { font-size: 12px; color: #8888aa; margin-bottom: 12px; }
#sidebar .desc { font-size: 13px; line-height: 1.5; color: #bbb; margin-bottom: 16px; }
#sidebar .stats { display: flex; gap: 12px; margin-bottom: 16px; }
#sidebar .stat { background: linear-gradient(135deg, #1a1a2e, #1e2240); padding: 8px 14px; border-radius: 8px; text-align: center; flex: 1; border: 1px solid #2a2a4a; }
#sidebar .stat .val { font-size: 20px; font-weight: 700; color: #7dd3fc; }
#sidebar .stat .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666;
  margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #2a2a4a;
}
.file-list, .export-list, .import-list { list-style: none; max-height: 300px; overflow-y: auto; }
.file-list::-webkit-scrollbar, .export-list::-webkit-scrollbar, .import-list::-webkit-scrollbar { width: 4px; }
.file-list::-webkit-scrollbar-thumb, .export-list::-webkit-scrollbar-thumb, .import-list::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }
.file-list li {
  padding: 4px 8px; font-size: 12px; border-radius: 4px; cursor: pointer;
  display: flex; justify-content: space-between; transition: background 0.1s;
}
.file-list li:hover { background: rgba(125,211,252,0.1); }
.file-list li .lines { color: #666; font-size: 11px; }
.export-list li, .import-list li { padding: 3px 8px; font-size: 12px; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
.export-list .kind {
  display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px;
  margin-right: 6px; font-family: 'Segoe UI', sans-serif;
}
.kind-function { background: #1e3a5f; color: #7dd3fc; }
.kind-class { background: #3a1e5f; color: #c084fc; }
.kind-type { background: #1e5f3a; color: #6ee7b7; }
.kind-interface { background: #1e5f4a; color: #6ee7c7; }
.kind-const { background: #5f3a1e; color: #fbbf24; }
.kind-enum { background: #5f1e3a; color: #f472b6; }
.kind-default { background: #3a3a3a; color: #ccc; }
.kind-struct { background: #3a1e5f; color: #c084fc; }
.kind-trait { background: #1e5f4a; color: #6ee7c7; }
.kind-method { background: #1e3a5f; color: #7dd3fc; }
.connection-item {
  padding: 4px 8px; font-size: 12px; display: flex; justify-content: space-between;
  align-items: center; border-radius: 4px; cursor: pointer; transition: background 0.1s;
}
.connection-item:hover { background: rgba(125,211,252,0.1); }
.connection-item .weight { font-size: 10px; background: #2a2a4a; padding: 1px 6px; border-radius: 8px; color: #aaa; }
#graph-container { flex: 1; position: relative; }
#cy {
  width: 100%; height: 100%;
  background-image: radial-gradient(circle, #1a1a2e 1px, transparent 1px);
  background-size: 24px 24px;
}
#legend {
  position: absolute; bottom: 16px; right: 16px; background: rgba(22, 33, 62, 0.92);
  border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px; font-size: 11px; z-index: 5;
}
#legend .title { font-weight: 600; margin-bottom: 6px; color: #aaa; }
#legend .item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
#legend .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
#tooltip {
  position: absolute; pointer-events: none; z-index: 20; display: none; max-width: 320px;
  background: linear-gradient(135deg, rgba(22, 33, 62, 0.97), rgba(16, 24, 48, 0.97));
  border: 1px solid #3a3a5a; border-radius: 8px; padding: 10px 14px;
  font-size: 12px; line-height: 1.5; backdrop-filter: blur(4px);
}
#help-hint { position: absolute; top: 12px; right: 16px; font-size: 11px; color: #666; z-index: 5; }
kbd { background: #2a2a4a; padding: 1px 5px; border-radius: 3px; font-size: 10px; border: 1px solid #3a3a5a; }
.code-block {
  background: #0d1117; border: 1px solid #2a2a4a; border-radius: 6px; padding: 10px 12px;
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11.5px; line-height: 1.5; color: #c9d1d9; overflow-x: auto; white-space: pre-wrap;
  word-break: break-word; margin: 4px 0 12px;
}
.export-item { padding: 6px 8px !important; cursor: pointer; border-radius: 4px; margin-bottom: 2px; transition: background 0.1s; }
.export-item:hover { background: rgba(125,211,252,0.1); }
.sig-preview {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #666;
  margin-top: 2px; padding-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.comment-preview { font-size: 11px; color: #7a8599; margin-top: 1px; padding-left: 4px; font-style: italic; }
.import-item { padding: 5px 8px !important; cursor: pointer; border-radius: 4px; margin-bottom: 2px; transition: background 0.1s; }
.import-item:hover { background: rgba(125,211,252,0.1); }
.type-tag { font-size: 9px; background: #1e3a5f; color: #7dd3fc; padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
.lang-badge {
  font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 6px;
  background: #2a2a4a; color: #aaa; font-family: monospace;
}
.param-list { list-style: none; padding: 0; margin: 4px 0 12px; }
.param-list li {
  padding: 3px 8px; font-size: 12px; font-family: 'JetBrains Mono', monospace;
  display: flex; gap: 8px;
}
.param-name { color: #7dd3fc; }
.param-type { color: #6ee7b7; }
.used-by-list { list-style: none; padding: 0; margin: 4px 0 12px; }
.used-by-list li {
  padding: 3px 8px; font-size: 11px; cursor: pointer; border-radius: 4px;
  color: #888; transition: background 0.1s;
}
.used-by-list li:hover { background: rgba(125,211,252,0.1); color: #ccc; }
.dim-symbol { opacity: 0.5; }
#level-badge {
  position: absolute; top: 12px; left: 16px; z-index: 5;
  background: rgba(22, 33, 62, 0.9); border: 1px solid #2a2a4a; border-radius: 20px;
  padding: 4px 14px; font-size: 11px; color: #7dd3fc; font-weight: 600;
  letter-spacing: 0.5px; backdrop-filter: blur(4px);
}
#minimap {
  position: absolute; bottom: 16px; left: 16px; z-index: 5;
  width: 140px; height: 90px; background: rgba(22, 33, 62, 0.85);
  border: 1px solid #2a2a4a; border-radius: 6px; cursor: pointer;
}
.tooltip-title { font-weight: 600; color: #fff; margin-bottom: 2px; }
.tooltip-meta { color: #888; font-size: 11px; }
/* Key files & entry points in sidebar */
.key-file-item {
  padding: 5px 8px; font-size: 12px; border-radius: 4px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  transition: background 0.1s; margin-bottom: 2px;
}
.key-file-item:hover { background: rgba(125,211,252,0.1); }
.key-file-item .badge {
  font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 600;
}
.badge-entry { background: #164e63; color: #22d3ee; }
.badge-hot { background: #451a03; color: #f59e0b; }
.badge-imports { background: #1a1a2e; color: #888; font-weight: 400; }
/* Global search overlay */
#global-search-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 100; backdrop-filter: blur(2px);
}
#global-search-panel {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  width: 600px; max-height: 70vh; background: #16213e;
  border: 1px solid #2a2a4a; border-radius: 12px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#global-search-input {
  width: 100%; padding: 14px 20px; border: none; border-bottom: 1px solid #2a2a4a;
  background: #1a1a2e; color: #e0e0e0; font-size: 15px; outline: none;
}
#global-search-input::placeholder { color: #555; }
#global-search-results {
  max-height: calc(70vh - 52px); overflow-y: auto; padding: 8px;
}
#global-search-results::-webkit-scrollbar { width: 6px; }
#global-search-results::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
.search-result-item {
  padding: 8px 12px; border-radius: 6px; cursor: pointer;
  transition: background 0.1s; margin-bottom: 2px;
}
.search-result-item:hover { background: rgba(125,211,252,0.1); }
.search-result-name { font-weight: 600; color: #e0e0e0; }
.search-result-path { font-size: 11px; color: #666; margin-top: 1px; }
.search-result-kind { font-size: 10px; display: inline-block; padding: 1px 5px; border-radius: 3px; margin-right: 6px; }
.search-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #555; padding: 8px 12px 4px; }
/* Code preview popup */
#code-popup-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(2px);
}
#code-popup {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 720px; max-width: 90vw; max-height: 80vh;
  background: #0d1117; border: 1px solid #2a2a4a; border-radius: 12px;
  overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
#code-popup-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 18px; background: #16213e; border-bottom: 1px solid #2a2a4a;
}
#code-popup-header .title { font-weight: 600; color: #fff; font-size: 14px; }
#code-popup-header .meta { font-size: 11px; color: #888; }
#code-popup-header .close-btn {
  background: none; border: 1px solid #3a3a5a; border-radius: 6px;
  color: #888; padding: 3px 10px; cursor: pointer; font-size: 12px;
  transition: all 0.15s;
}
#code-popup-header .close-btn:hover { color: #fff; border-color: #666; }
#code-popup-body {
  padding: 16px 0; max-height: calc(80vh - 52px); overflow-y: auto;
}
#code-popup-body::-webkit-scrollbar { width: 8px; }
#code-popup-body::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 4px; }
#code-popup-body pre {
  margin: 0; padding: 0 18px; font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12.5px; line-height: 1.6; color: #c9d1d9; white-space: pre; tab-size: 2;
}
#code-popup-body .line-num {
  display: inline-block; width: 40px; text-align: right; padding-right: 16px;
  color: #444; user-select: none; font-size: 11px;
}
</style>
</head>
<body>

<div id="code-popup-overlay" onclick="if(event.target===this)closeCodePopup()">
  <div id="code-popup">
    <div id="code-popup-header">
      <div><div class="title" id="code-popup-title"></div><div class="meta" id="code-popup-meta"></div></div>
      <button class="close-btn" onclick="closeCodePopup()">Esc</button>
    </div>
    <div id="code-popup-body"><pre id="code-popup-code"></pre></div>
  </div>
</div>

<div id="global-search-overlay" onclick="if(event.target===this)closeGlobalSearch()">
  <div id="global-search-panel">
    <input id="global-search-input" type="text" placeholder="Search all files, symbols, modules...">
    <div id="global-search-results"></div>
  </div>
</div>

<div id="topbar">
  <div id="breadcrumb"></div>
  <input id="search-box" type="text" placeholder="Search modules, files, symbols... (/)">
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-content"></div>
  </div>
  <div id="graph-container">
    <div id="cy"></div>
    <div id="level-badge">L1 Modules</div>
    <canvas id="minimap" width="140" height="90"></canvas>
    <div id="legend"></div>
    <div id="tooltip"></div>
    <div id="help-hint">
      Click node to drill in &middot; <kbd>Esc</kbd> go back &middot; <kbd>/</kbd> filter &middot; <kbd>Ctrl+K</kbd> global search
    </div>
  </div>
</div>

<script>
const DATA = window.CODEBASE_DATA;
if (!DATA) {
  document.body.innerHTML = '<div style="padding:40px;color:#f66;font-size:18px">Error: data.js failed to load. Run <code>node analyze.mjs</code> first.</div>';
  throw new Error('No data');
}
document.title = `codesight — ${DATA.projectName}`;
console.log('Loaded:', DATA.modules.length, 'modules,', DATA.edges.length, 'edges');

// --- Colors ---
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// Curated palette — Tailwind-inspired, perceptually distinct
const COLOR_PALETTE = [
  '#3b82f6', '#a855f7', '#10b981', '#f59e0b', '#ef4444',
  '#06b6d4', '#84cc16', '#ec4899', '#f97316', '#14b8a6',
  '#6366f1', '#e879f9', '#0ea5e9', '#8b5cf6', '#22c55e',
  '#fb923c', '#38bdf8', '#d946ef', '#facc15', '#2dd4bf',
];

function getColor(name) {
  return COLOR_PALETTE[hashStr(name) % COLOR_PALETTE.length];
}

function getSymbolColor(kind) {
  const map = {
    function: '#3b82f6', method: '#3b82f6',
    class: '#a855f7', struct: '#a855f7',
    type: '#10b981',
    interface: '#14b8a6', trait: '#14b8a6',
    const: '#f59e0b',
    enum: '#ec4899',
    default: '#9ca3af',
  };
  return map[kind] || '#9ca3af';
}

function shadeColor(hex, amount) {
  let r = parseInt(hex.slice(1,3), 16) + amount;
  let g = parseInt(hex.slice(3,5), 16) + amount;
  let b = parseInt(hex.slice(5,7), 16) + amount;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function fadeColor(hex, opacity) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${opacity})`;
}

// --- Level badge ---
const LEVEL_LABELS = { modules: 'L1 Modules', subdirs: 'L2 Folders', files: 'L3 Files', symbols: 'L4 Symbols' };
function updateLevelBadge() {
  document.getElementById('level-badge').textContent = LEVEL_LABELS[currentLevel] || '';
}

// --- Minimap ---
function updateMinimap() {
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!cy || cy.nodes().length === 0) return;

  const bb = cy.extent();
  const nodes = cy.nodes();
  const scaleX = canvas.width / (bb.w || 1);
  const scaleY = canvas.height / (bb.h || 1);
  const scale = Math.min(scaleX, scaleY) * 0.85;
  const offX = (canvas.width - bb.w * scale) / 2;
  const offY = (canvas.height - bb.h * scale) / 2;

  nodes.forEach(n => {
    const pos = n.position();
    const x = (pos.x - bb.x1) * scale + offX;
    const y = (pos.y - bb.y1) * scale + offY;
    const r = Math.max(2, parseFloat(n.data('size') || 30) * scale * 0.15);
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = n.data('color') || '#666';
    ctx.globalAlpha = 0.8;
    ctx.fill();
  });

  // Viewport rectangle
  const vp = cy.extent();
  const vpBB = { x1: (vp.x1 - bb.x1) * scale + offX, y1: (vp.y1 - bb.y1) * scale + offY,
    x2: (vp.x2 - bb.x1) * scale + offX, y2: (vp.y2 - bb.y1) * scale + offY };
  ctx.globalAlpha = 1;
  ctx.strokeStyle = 'rgba(125,211,252,0.6)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(vpBB.x1, vpBB.y1, vpBB.x2 - vpBB.x1, vpBB.y2 - vpBB.y1);
}

// --- State ---
let currentLevel = 'modules';
let currentModule = null;
let currentSubdir = null;   // Now stores full nested path like "helpers/string" or null
let currentFile = null;
let cy = null;

function handleNodeTap(e) {
  const node = e.target;
  const id = node.data('id');
  const nodeType = node.data('nodeType');
  if (currentLevel === 'modules') {
    drillToModule(id);
  } else if (currentLevel === 'subdirs') {
    const info = node.data('info');
    if (info && info.name) {
      if (info.name === '(root)') {
        drillToSubdir(currentModule, currentSubdir);
      } else {
        const deeper = currentSubdir ? currentSubdir + '/' + info.name : info.name;
        drillToNestedDir(currentModule, deeper);
      }
    }
  } else if (currentLevel === 'files') {
    drillToSymbols(id);
  } else if (currentLevel === 'symbols') {
    if (nodeType === 'export') {
      showExportDetail(node.data('info'), currentFile);
      if (node.data('info')?.source) showCodePopup(node.data('info'), currentFile);
    }
    else if (nodeType === 'import') showImportDetail(node.data('info'), currentFile);
    else if (nodeType === 'file') renderSymbolSidebar(currentFile);
  }
}

// --- Cytoscape init ---
function initCy() {
  cy = cytoscape({
    container: document.getElementById('cy'),
    style: [
      {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'text-valign': 'bottom', 'text-halign': 'center', 'text-margin-y': 6,
          'font-size': '11px', 'color': '#e0e0e0',
          'text-outline-color': '#0f0f1a', 'text-outline-width': 2,
          'text-background-color': '#0f0f1a', 'text-background-opacity': 0.6,
          'text-background-padding': '2px', 'text-background-shape': 'roundrectangle',
          'background-color': 'data(color)', 'background-opacity': 0.85,
          'shape': 'round-rectangle',
          'width': 'data(size)', 'height': 'data(sizeH)',
          'border-width': 1, 'border-color': 'data(borderColor)', 'border-opacity': 0.4,
          'text-max-width': '90px', 'text-wrap': 'ellipsis',
        }
      },
      { selector: 'node.dimmed', style: { 'opacity': 0.15 } },
      {
        selector: 'node.highlighted',
        style: {
          'border-width': 2, 'border-color': '#fff', 'border-opacity': 1,
          'shadow-blur': 20, 'shadow-color': 'data(color)', 'shadow-opacity': 0.6,
          'shadow-offset-x': 0, 'shadow-offset-y': 0,
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 'data(width)',
          'line-color': 'data(edgeColor)', 'line-opacity': 0.35,
          'target-arrow-color': 'data(edgeColor)', 'target-arrow-shape': 'triangle',
          'arrow-scale': 0.7, 'curve-style': 'bezier',
        }
      },
      {
        selector: 'edge.highlighted',
        style: {
          'line-color': '#7dd3fc', 'line-opacity': 0.8,
          'target-arrow-color': '#7dd3fc', 'z-index': 10, 'width': 'mapData(width, 0.5, 6, 1.5, 6)',
        }
      },
      { selector: 'edge.dimmed', style: { 'line-opacity': 0.04 } },
      { selector: 'node.search-match', style: { 'border-width': 3, 'border-color': '#fbbf24', 'border-opacity': 1, 'z-index': 999 } },
      { selector: 'node.entry-point', style: { 'border-width': 2.5, 'border-color': '#22d3ee', 'border-opacity': 1, 'border-style': 'double', 'shape': 'diamond' } },
      { selector: 'node.key-file', style: { 'shadow-blur': 12, 'shadow-color': '#f59e0b', 'shadow-opacity': 0.5 } },
    ],
    layout: { name: 'preset' },
    minZoom: 0.1, maxZoom: 5, wheelSensitivity: 0.3,
  });
  cy.on('tap', 'node', handleNodeTap);
  cy.on('mouseover', 'node', (e) => {
    highlightConnected(e.target);
    const info = e.target.data('info');
    const nodeType = e.target.data('nodeType');
    if (info) {
      let html = `<div class="tooltip-title">${escHtml(info.name || e.target.data('label'))}</div>`;
      if (info.fileCount !== undefined) html += `<div class="tooltip-meta">${info.fileCount} files, ${(info.lineCount/1000).toFixed(1)}k lines</div>`;
      else if (info.lineCount !== undefined) {
        let meta = `${info.lineCount} lines, ${(info.symbols || []).length} symbols`;
        if (info.importedByCount > 0) meta += ` &middot; imported by ${info.importedByCount} files`;
        if (info.isEntryPoint) meta += ' &middot; <span style="color:#22d3ee">entry point</span>';
        html += `<div class="tooltip-meta">${meta}</div>`;
        // Show top 3 exports
        const topExports = (info.symbols || []).filter(s => s.exported).slice(0, 3);
        if (topExports.length > 0) {
          html += `<div class="tooltip-meta" style="margin-top:3px;color:#aaa">${topExports.map(s => '<span class="kind kind-' + s.kind + '" style="font-size:8px;padding:0 3px">' + s.kind[0] + '</span>' + escHtml(s.name)).join(', ')}</div>`;
        }
      }
      else if (info.kind) html += `<div class="tooltip-meta">${info.kind}${info.parameters?.length ? ' (' + info.parameters.length + ' params)' : ''}</div>`;
      else if (info.source) html += `<div class="tooltip-meta">${info.symbols?.length || 0} symbols from ${escHtml(info.resolvedModule || '')}</div>`;
      showTooltipHtml(e.originalEvent, html);
    }
  });
  cy.on('mouseout', 'node', () => { unhighlightAll(); hideTooltip(); });
  cy.on('mouseover', 'edge', (e) => {
    const edge = e.target;
    showTooltipHtml(e.originalEvent, `<div class="tooltip-title">${escHtml(edge.data('source'))} → ${escHtml(edge.data('target'))}</div><div class="tooltip-meta">${edge.data('rawWeight')} imports</div>`);
  });
  cy.on('mouseout', 'edge', () => hideTooltip());
  cy.on('pan zoom', () => updateMinimap());
  cy.on('render', () => updateMinimap());
}

function highlightConnected(node) {
  const connected = node.connectedEdges();
  const neighbors = node.neighborhood('node');
  cy.elements().addClass('dimmed');
  node.removeClass('dimmed').addClass('highlighted');
  connected.removeClass('dimmed').addClass('highlighted');
  neighbors.removeClass('dimmed');
}
function unhighlightAll() { cy.elements().removeClass('dimmed').removeClass('highlighted'); }

function showTooltipHtml(event, html) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = html;
  tt.style.display = 'block';
  tt.style.left = (event.offsetX + 14) + 'px';
  tt.style.top = (event.offsetY + 14) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

// --- Breadcrumb ---

  let html = '';

  if (currentLevel === 'modules') {
    html = `<span class="active">${escHtml(projName)}</span>`;
  } else {

    // Module segment
    const isModuleActive = !currentSubdir && (currentLevel === 'subdirs' || (currentLevel === 'files' && !currentSubdir));
    html += `<span class="sep">/</span>`;

      html += `<span class="active">${escHtml(currentModule)}</span>`;

      html += `<span onclick="drillToModule('${escJs(currentModule)}')">${escHtml(currentModule)}</span>`;
    }
    // Nested path segments — each segment is clickable to drill to that depth
    if (currentSubdir) {

    }

// --- Helpers ---
function getModuleData(moduleName) {
  if (moduleName === 'root') {
    return { name: 'root', description: `${DATA.rootFiles.length} files in project root`, fileCount: DATA.rootFiles.length, lineCount: DATA.rootFiles.reduce((s,f)=>s+f.lineCount,0), files: DATA.rootFiles };
  }
  return DATA.modules.find(m => m.name === moduleName);
}

// Get the path-relative-to-module for a file (strips src/ prefix and module name)
function getFileInnerPath(filePath, moduleName) {
  let inner = filePath;
  const srcPrefixes = ['src/', 'lib/', 'app/', 'source/', 'packages/'];
  for (const prefix of srcPrefixes) {
    if (inner.startsWith(prefix)) { inner = inner.substring(prefix.length); break; }
  }
  const modulePath = moduleName === 'root' ? '' : moduleName;
  if (modulePath && inner.startsWith(modulePath + '/')) {
    inner = inner.substring(modulePath.length + 1);
  }
  return inner;
}

// Group files by the next directory level at the given nestedPath depth.
// nestedPath = null means top of module, "helpers" means inside helpers/, "helpers/string" means inside helpers/string/, etc.
function getSubdirMap(files, moduleName, nestedPath) {
  const subdirMap = new Map();
  for (const f of files) {
    let inner = getFileInnerPath(f.path, moduleName);
    // Strip the nestedPath prefix to get the remainder
    if (nestedPath) {
      if (!inner.startsWith(nestedPath + '/')) continue; // file not under this nested path
      inner = inner.substring(nestedPath.length + 1);
    }
    const slashIdx = inner.indexOf('/');
    const subdir = slashIdx !== -1 ? inner.substring(0, slashIdx) : '(root)';
    if (!subdirMap.has(subdir)) subdirMap.set(subdir, []);
    subdirMap.get(subdir).push(f);
  }
  return subdirMap;
}

function getModuleConnections(moduleName) {
  const connections = [];
  for (const e of DATA.edges) {
    if (e.source === moduleName) connections.push({ module: e.target, weight: e.weight, direction: 'out' });
    else if (e.target === moduleName) connections.push({ module: e.source, weight: e.weight, direction: 'in' });
  }
  return connections.sort((a,b) => b.weight - a.weight);
}

function resolveImportPath(importSource, fromPath) {
  if (!importSource.startsWith('.')) return null;
  const fromDir = fromPath.split('/').slice(0, -1).join('/');
  const parts = importSource.replace(/\.(js|ts|tsx|jsx|mjs|cjs|py)$/, '').split('/');
  const baseParts = fromDir ? fromDir.split('/') : [];
  for (const part of parts) {
    if (part === '.') continue;
    else if (part === '..') baseParts.pop();
    else baseParts.push(part);
  }
  return baseParts.join('/');
}

// --- Level 2: Module -> Subdirs or Files ---
function drillToModule(moduleName) {
  const mod = getModuleData(moduleName);
  if (!mod) return;
  currentModule = moduleName;
  currentSubdir = null;
  currentFile = null;

  drillToNestedDir(moduleName, null);
}

// Core recursive drill: given a module and a nested path, decide whether to show subdirs or files
function drillToNestedDir(moduleName, nestedPath) {
  const mod = getModuleData(moduleName);
  if (!mod) return;
  currentModule = moduleName;
  currentSubdir = nestedPath;
  currentFile = null;

  const subdirMap = getSubdirMap(mod.files, moduleName, nestedPath);
  const subdirCount = [...subdirMap.keys()].filter(k => k !== '(root)').length;

  if (subdirCount >= 1 && subdirMap.has('(root)') && subdirMap.get('(root)').length > 0) {
    // Has subdirs AND root files — show subdir view (including "(root)" group)
    currentLevel = 'subdirs';
    renderBreadcrumb();
    renderSubdirView(mod, subdirMap);
  } else if (subdirCount === 1) {
    // Only one subdir and no root files — skip this level, drill deeper
    const onlyDir = [...subdirMap.keys()].find(k => k !== '(root)');
    const deeper = nestedPath ? nestedPath + '/' + onlyDir : onlyDir;
    drillToNestedDir(moduleName, deeper);
  } else if (subdirCount >= 2) {
    // Multiple subdirs, no root files — show subdir view
    currentLevel = 'subdirs';
    renderBreadcrumb();
    renderSubdirView(mod, subdirMap);
  } else {
    // Only root-level files, no subdirs — show files
    drillToSubdir(moduleName, nestedPath);
  }
}

function drillToFiles(moduleName) { drillToModule(moduleName); }

function renderSubdirView(mod, subdirMap) {
  const elements = [];
  const subdirs = [...subdirMap.entries()]
    .map(([name, files]) => ({ name, files, fileCount: files.length, lineCount: files.reduce((s, f) => s + f.lineCount, 0) }))
    .sort((a, b) => b.lineCount - a.lineCount);

  for (let si = 0; si < subdirs.length; si++) {
    const sub = subdirs[si];
    const w = Math.max(30, Math.min(80, 12 * Math.log2(sub.lineCount + 1)));
    const label = sub.name === '(root)' ? `${mod.name}/ files` : sub.name;
    const color = shadeColor(getColor(mod.name), si * 8 - 15);
    elements.push({
      data: {
        id: `subdir:${sub.name}`, label, color, borderColor: shadeColor(color, -30),
        size: w, sizeH: w * 0.65, nodeType: 'subdir', info: sub,
      }
    });
  }

  // Inter-subdir edges
  const edgeMap = new Map();
  for (const [subdirName, files] of subdirMap) {
    for (const f of files) {
      for (const imp of f.imports) {
        if (imp.resolvedModule !== mod.name && imp.resolvedModule !== 'root') continue;
        const targetPath = resolveImportPath(imp.source, f.path);
        if (!targetPath) continue;
        for (const [targetSub, targetFiles] of subdirMap) {
          if (targetSub === subdirName) continue;
          if (targetFiles.some(tf => tf.path.replace(/\.[^.]+$/, '').endsWith(targetPath) || tf.path === targetPath)) {
            const key = `subdir:${subdirName}->subdir:${targetSub}`;
            edgeMap.set(key, (edgeMap.get(key) || 0) + 1);
            break;
          }
        }
      }
    }
  }
  for (const [key, weight] of edgeMap) {
    const [src, tgt] = key.split('->');
    elements.push({ data: { id: key, source: src, target: tgt, width: Math.max(0.5, Math.min(4, Math.log2(weight + 1))), rawWeight: weight, edgeColor: getColor(mod.name) } });
  }

  cy.elements().remove();
  cy.add(elements);
  cy.layout({ name: 'cose', animate: true, animationDuration: 400, nodeDimensionsIncludeLabels: true, idealEdgeLength: () => 150, nodeRepulsion: () => 10000, gravity: 0.3, numIter: 1000, padding: 50, randomize: true, nodeOverlap: 20 }).run();
  cy.fit(undefined, 40);

  renderSubdirSidebar(mod, subdirs);
  document.getElementById('legend').innerHTML = '';
  updateLevelBadge();
  setTimeout(updateMinimap, 500);
}

function renderSubdirSidebar(mod, subdirs) {
  const connections = getModuleConnections(mod.name);
  let html = `
    <h2>${escHtml(mod.name)}</h2>
    <div class="subtitle">${escHtml(mod.path || mod.name)}/</div>
    <div class="desc">${escHtml(mod.description || '')}</div>
    <div class="stats">
      <div class="stat"><div class="val">${subdirs.length}</div><div class="label">Folders</div></div>
      <div class="stat"><div class="val">${mod.files.length}</div><div class="label">Files</div></div>
      <div class="stat"><div class="val">${(mod.lineCount/1000).toFixed(1)}k</div><div class="label">Lines</div></div>
    </div>
  `;
  if (connections.length > 0) {
    html += '<div class="section-title">Dependencies</div><div>';
    for (const c of connections.slice(0, 10)) {
      html += `<div class="connection-item"><span>${c.direction === 'out' ? '→' : '←'} ${escHtml(c.module)}</span><span class="weight">${c.weight} imports</span></div>`;
    }
    html += '</div>';
  }
  html += '<div class="section-title">Subdirectories</div><ul class="file-list">';
  for (const sub of subdirs) {
    const label = sub.name === '(root)' ? '(files in root)' : sub.name + '/';
    if (sub.name === '(root)') {
      html += `<li onclick="drillToSubdir('${escJs(mod.name)}', ${currentSubdir ? "'" + escJs(currentSubdir) + "'" : 'null'})">
        <span>${escHtml(label)}</span>
        <span class="lines">${sub.fileCount} files, ${(sub.lineCount/1000).toFixed(1)}k lines</span>
      </li>`;
    } else {
      const deeper = currentSubdir ? currentSubdir + '/' + sub.name : sub.name;
      html += `<li onclick="drillToNestedDir('${escJs(mod.name)}', '${escJs(deeper)}')">
        <span>${escHtml(label)}</span>
        <span class="lines">${sub.fileCount} files, ${(sub.lineCount/1000).toFixed(1)}k lines</span>
      </li>`;
    }
  }
  html += '</ul>';
  document.getElementById('sidebar-content').innerHTML = html;
}

// --- Level 2b: Files within a (possibly nested) subdirectory ---
function drillToSubdir(moduleName, nestedPath) {
  currentLevel = 'files';
  currentModule = moduleName;
  currentSubdir = nestedPath;
  currentFile = null;
  renderBreadcrumb();

  const mod = getModuleData(moduleName);
  if (!mod) return;

  // Get files at exactly this nesting level (no deeper subdirs)
  const subdirMap = getSubdirMap(mod.files, moduleName, nestedPath);
  let files;
  if (nestedPath === null) {
    const hasSubdirs = [...subdirMap.keys()].some(k => k !== '(root)');
    files = hasSubdirs ? (subdirMap.get('(root)') || []) : mod.files;
  } else {
    // Show only files directly at this nested path (the "(root)" group within this subdir)
    files = subdirMap.get('(root)') || [];
    // Also include files from all sub-subdirs if there are any (flatten for file view)
    for (const [key, dirFiles] of subdirMap) {
      if (key !== '(root)') files = files.concat(dirFiles);
    }
  }

  const elements = [];
  const modColor = getColor(moduleName);
  for (const f of files) {
    const w = Math.max(28, Math.min(65, 8 * Math.log2(f.lineCount + 1)));
    const label = f.name.replace(/\.[^.]+$/, '');
    const classes = [];
    if (f.isEntryPoint) classes.push('entry-point');
    if (f.importedByCount > 20) classes.push('key-file');
    elements.push({ data: { id: f.path, label, color: modColor, borderColor: shadeColor(modColor, -30), size: w, sizeH: w * 0.6, info: f }, classes: classes.join(' ') });
  }

  // Intra-file edges
  const filePaths = new Set(files.map(f => f.path));
  for (const f of files) {
    for (const imp of f.imports) {
      if (imp.resolvedModule === 'external') continue;
      const targetPath = resolveImportPath(imp.source, f.path);
      if (!targetPath) continue;
      // Find matching file
      for (const fp of filePaths) {
        if (fp === f.path) continue;
        if (fp.replace(/\.[^.]+$/, '').endsWith(targetPath) || fp === targetPath) {
          const edgeId = `${f.path}->${fp}`;
          if (!elements.some(e => e.data?.id === edgeId)) {
            elements.push({ data: { id: edgeId, source: f.path, target: fp, width: 1, rawWeight: 1, edgeColor: modColor } });
          }
          break;
        }
      }
    }
  }

  cy.elements().remove();
  cy.add(elements);
  const layoutName = files.length > 150 ? 'concentric' : 'cose';
  cy.layout({
    name: layoutName, animate: true, animationDuration: 400, nodeDimensionsIncludeLabels: true, randomize: true, padding: 40,
    ...(layoutName === 'cose' ? { idealEdgeLength: () => files.length > 80 ? 90 : 130, nodeRepulsion: () => 9000, gravity: 0.35, numIter: 1000, nodeOverlap: 20 }
      : { concentric: (node) => node.degree(), levelWidth: () => 3, minNodeSpacing: 25 }),
  }).run();
  cy.fit(undefined, 40);

  renderFileListSidebar(mod, files, subdirName);
  document.getElementById('legend').innerHTML = '';
  updateLevelBadge();
  setTimeout(updateMinimap, 500);
}

function renderFileListSidebar(mod, files, subdirName) {
  const lineCount = files.reduce((s,f) => s + f.lineCount, 0);
  const totalSymbols = files.reduce((s,f) => s + f.symbols.length, 0);
  const title = subdirName ? `${mod.name}/${subdirName}` : mod.name;

  let html = `
    <h2>${escHtml(title)}</h2>
    <div class="subtitle">${escHtml(subdirName ? mod.name + '/' + subdirName + '/' : (mod.path || mod.name) + '/')}</div>
    <div class="desc">${escHtml(mod.description || '')}</div>
    <div class="stats">
      <div class="stat"><div class="val">${files.length}</div><div class="label">Files</div></div>
      <div class="stat"><div class="val">${(lineCount/1000).toFixed(1)}k</div><div class="label">Lines</div></div>
      <div class="stat"><div class="val">${totalSymbols}</div><div class="label">Symbols</div></div>
    </div>
    <div class="section-title">Files</div>
    <ul class="file-list">
  `;
  for (const f of files) {
    const langBadge = f.language ? `<span class="lang-badge">${f.language}</span>` : '';
    html += `<li onclick="drillToSymbols('${escJs(f.path)}')">
      <span>${escHtml(f.name)}${langBadge}</span>
      <span class="lines">${f.lineCount} lines, ${f.symbols.length} symbols</span>
    </li>`;
  }
  html += '</ul>';
  document.getElementById('sidebar-content').innerHTML = html;
}

// --- Level 3: File Symbols ---
function drillToSymbols(filePath) {
  const mod = currentModule === 'root'
    ? { name: 'root', files: DATA.rootFiles }
    : DATA.modules.find(m => m.name === currentModule);
  if (!mod) return;
  const file = mod.files.find(f => f.path === filePath);
  if (!file) return;

  currentLevel = 'symbols';
  currentFile = file;
  renderBreadcrumb();

  const elements = [];
  const centerX = 0, centerY = 0;

  const centerColor = getColor(currentModule);
  elements.push({
    data: { id: 'center', label: file.name.replace(/\.[^.]+$/, ''), color: centerColor, borderColor: shadeColor(centerColor, -30), size: 70, sizeH: 50, nodeType: 'file', info: file },
    position: { x: centerX, y: centerY },
  });

  // Exported symbols on the right semicircle
  const exported = file.symbols.filter(s => s.exported);
  for (let i = 0; i < exported.length; i++) {
    const angle = ((i / Math.max(exported.length, 1)) * Math.PI) - Math.PI / 2;
    const radius = 180 + (exported.length > 10 ? 50 : 0);
    const symColor = getSymbolColor(exported[i].kind);
    elements.push({
      data: {
        id: `export:${exported[i].name}`, label: exported[i].name, color: symColor, borderColor: shadeColor(symColor, -30),
        size: 36, sizeH: 26, nodeType: 'export', info: exported[i],
      },
      position: { x: centerX + radius * Math.cos(angle), y: centerY + radius * Math.sin(angle) },
    });
    elements.push({ data: { id: `center->export:${exported[i].name}`, source: 'center', target: `export:${exported[i].name}`, width: 1.5, rawWeight: 1, edgeColor: symColor } });
  }

  // Imports on the left semicircle
  const imports = file.imports;
  for (let i = 0; i < imports.length; i++) {
    const imp = imports[i];
    const angle = ((i / Math.max(imports.length, 1)) * Math.PI) + Math.PI / 2;
    const radius = 220 + (imports.length > 10 ? 50 : 0);
    const nodeId = `import:${i}:${imp.source}`;
    const srcParts = imp.source.replace(/\.[^.]+$/, '').split('/');
    const shortLabel = srcParts[srcParts.length - 1];
    const impColor = imp.resolvedModule === 'external' ? '#555' : getColor(imp.resolvedModule);

    elements.push({
      data: { id: nodeId, label: shortLabel, color: impColor, borderColor: shadeColor(impColor, -20), size: 32, sizeH: 22, nodeType: 'import', info: imp },
      position: { x: centerX + radius * Math.cos(angle), y: centerY + radius * Math.sin(angle) },
    });
    elements.push({ data: { id: `${nodeId}->center`, source: nodeId, target: 'center', width: 1, rawWeight: imp.symbols.length || 1, edgeColor: impColor } });
  }

  cy.elements().remove();
  cy.add(elements);
  cy.layout({ name: 'preset' }).run();
  cy.fit(undefined, 50);

  renderSymbolSidebar(file);
  updateLevelBadge();
  setTimeout(updateMinimap, 100);
  document.getElementById('legend').innerHTML = `
    <div class="title">Symbol types</div>
    <div class="item"><div class="dot" style="background:#3b82f6"></div>function</div>
    <div class="item"><div class="dot" style="background:#a855f7"></div>class</div>
    <div class="item"><div class="dot" style="background:#10b981"></div>type</div>
    <div class="item"><div class="dot" style="background:#14b8a6"></div>interface</div>
    <div class="item"><div class="dot" style="background:#f59e0b"></div>const</div>
    <div class="item"><div class="dot" style="background:#ec4899"></div>enum</div>
    <div class="item"><div class="dot" style="background:#666"></div>external import</div>
  `;
}

function renderSymbolSidebar(file) {
  const exported = file.symbols.filter(s => s.exported);
  let html = `
    <h2>${escHtml(file.name)}</h2>
    <div class="subtitle">${escHtml(file.path)}${file.language ? ' <span class="lang-badge">' + file.language + '</span>' : ''}</div>
    <div class="stats">
      <div class="stat"><div class="val">${file.lineCount}</div><div class="label">Lines</div></div>
      <div class="stat"><div class="val">${exported.length}</div><div class="label">Exports</div></div>
      <div class="stat"><div class="val">${file.imports.length}</div><div class="label">Imports</div></div>
    </div>
    <div class="desc" style="font-size:12px;color:#888;margin-bottom:8px">Click any node in the graph to see details</div>
  `;

  if (exported.length > 0) {
    html += '<div class="section-title">Exported Symbols</div><ul class="export-list">';
    for (const sym of exported) {
      const sigPreview = sym.signature ? sym.signature.split('\n')[0].substring(0, 80) : '';
      html += `<li class="export-item" onclick="showExportDetail(currentFile.symbols.find(x=>x.name==='${escJs(sym.name)}' && x.exported), currentFile)">
        <div><span class="kind kind-${sym.kind}">${sym.kind}</span><strong>${escHtml(sym.name)}</strong></div>
        ${sigPreview ? `<div class="sig-preview">${escHtml(sigPreview)}</div>` : ''}
        ${sym.comment ? `<div class="comment-preview">${escHtml(sym.comment.split('\n')[0].substring(0, 100))}</div>` : ''}
      </li>`;
    }
    html += '</ul>';
  }

  if (file.imports.length > 0) {
    html += '<div class="section-title">Imports</div><ul class="import-list">';
    for (let i = 0; i < file.imports.length; i++) {
      const imp = file.imports[i];
      const symbols = imp.symbols.length > 0 ? imp.symbols.join(', ') : '(side-effect)';
      const typeTag = imp.typeOnly ? '<span class="type-tag">type</span>' : '';
      const srcShort = imp.source.replace(/\.[^.]+$/, '').split('/').pop();
      html += `<li class="import-item" onclick="showImportDetail(currentFile.imports[${i}], currentFile)">
        <div>
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${imp.resolvedModule === 'external' ? '#666' : getColor(imp.resolvedModule)};margin-right:4px"></span>
          <strong>${escHtml(srcShort)}</strong> ${typeTag}
          <span style="color:#555;font-size:10px;margin-left:4px">${escHtml(imp.resolvedModule)}</span>
        </div>
        <div style="font-size:11px;color:#888;padding-left:14px;font-family:monospace">${escHtml(symbols)}</div>
      </li>`;
    }
    html += '</ul>';
  }

  document.getElementById('sidebar-content').innerHTML = html;
}

function showExportDetail(sym, file) {
  if (!sym) return;
  let html = `
    <h2>${escHtml(sym.name)}</h2>
    <div class="subtitle"><span class="kind kind-${sym.kind}" style="font-size:12px">${sym.kind}</span> ${sym.exported ? 'exported from' : 'in'} ${escHtml(file.name)} <span style="color:#666;font-size:11px">line ${sym.line}</span></div>
  `;

  if (sym.signature) {
    html += `<div class="section-title">Signature</div><pre class="code-block">${escHtml(sym.signature)}</pre>`;
  }

  if (sym.parameters && sym.parameters.length > 0) {
    html += '<div class="section-title">Parameters</div><ul class="param-list">';
    for (const p of sym.parameters) {
      html += `<li><span class="param-name">${escHtml(p.name)}</span>${p.type ? `<span class="param-type">${escHtml(p.type)}</span>` : ''}</li>`;
    }
    html += '</ul>';
  }

  if (sym.returnType) {
    html += `<div class="section-title">Returns</div><div class="desc" style="font-family:monospace;color:#6ee7b7">${escHtml(sym.returnType)}</div>`;
  }

  if (sym.comment) {
    html += `<div class="section-title">Description</div><div class="desc">${escHtml(sym.comment)}</div>`;
  }

  if (sym.usedBy && sym.usedBy.length > 0) {
    html += `<div class="section-title">Used by (${sym.usedBy.length} files)</div><ul class="used-by-list">`;
    for (const path of sym.usedBy) {
      html += `<li>${escHtml(path)}</li>`;
    }
    html += '</ul>';
  }

  html += `
    <div class="section-title" style="margin-top:20px">File context</div>
    <div class="desc" style="font-size:12px;color:#888">
      Part of <strong>${escHtml(file.path)}</strong> (${file.lineCount} lines)<br>
      Module: <strong>${escHtml(currentModule)}</strong>
    </div>
  `;

  if (sym.source) {
    html += `<div style="margin-top:12px"><a href="#" onclick="showCodePopup(currentFile.symbols.find(x=>x.name==='${escJs(sym.name)}' && x.exported), currentFile);return false" style="color:#7dd3fc;font-size:12px;display:inline-flex;align-items:center;gap:4px"><kbd style="font-size:10px">&lt;/&gt;</kbd> View source code</a></div>`;
  }

  const others = file.symbols.filter(e => e.name !== sym.name && e.exported);
  if (others.length > 0) {
    html += '<div class="section-title">Other exports in this file</div><ul class="export-list">';
    for (const e of others) {
      html += `<li style="cursor:pointer" onclick="showExportDetail(currentFile.symbols.find(x=>x.name==='${escJs(e.name)}' && x.exported), currentFile)">
        <span class="kind kind-${e.kind}">${e.kind}</span>${escHtml(e.name)}
      </li>`;
    }
    html += '</ul>';
  }

  html += `<div style="margin-top:16px"><a href="#" onclick="renderSymbolSidebar(currentFile);return false" style="color:#7dd3fc;font-size:12px">\u2190 Back to file overview</a></div>`;
  document.getElementById('sidebar-content').innerHTML = html;
}

function showImportDetail(imp, file) {
  let html = `
    <h2>${escHtml(imp.source.replace(/\.[^.]+$/, '').split('/').pop())}</h2>
    <div class="subtitle">Imported into ${escHtml(file.name)}</div>
    <div class="section-title">Source</div>
    <pre class="code-block">${escHtml(imp.source)}</pre>
    <div class="section-title">Module</div>
    <div class="desc">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${imp.resolvedModule === 'external' ? '#666' : getColor(imp.resolvedModule)};margin-right:6px"></span>
      <strong>${escHtml(imp.resolvedModule)}</strong>
      ${imp.typeOnly ? '<span style="color:#888;font-size:11px;margin-left:6px">(type-only import)</span>' : ''}
    </div>
  `;
  if (imp.symbols.length > 0) {
    html += '<div class="section-title">Imported symbols</div><ul class="export-list">';
    for (const sym of imp.symbols) {
      html += `<li style="font-family:monospace;font-size:12px">${escHtml(sym)}</li>`;
    }
    html += '</ul>';
  } else {
    html += '<div class="section-title">Import type</div><div class="desc">Side-effect import (no named symbols)</div>';
  }
  html += `<div style="margin-top:16px"><a href="#" onclick="renderSymbolSidebar(currentFile);return false" style="color:#7dd3fc;font-size:12px">\u2190 Back to file overview</a></div>`;
  document.getElementById('sidebar-content').innerHTML = html;
}

// --- Search ---
const searchBox = document.getElementById('search-box');
searchBox.addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase().trim();
  if (!query) { cy.elements().removeClass('dimmed').removeClass('search-match'); return; }
  cy.nodes().forEach(node => {
    const label = (node.data('label') || '').toLowerCase();
    const id = (node.data('id') || '').toLowerCase();
    if (label.includes(query) || id.includes(query)) { node.removeClass('dimmed').addClass('search-match'); }
    else { node.addClass('dimmed').removeClass('search-match'); }
  });
  cy.edges().addClass('dimmed');
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.activeElement === searchBox) {
      searchBox.value = ''; searchBox.blur();
      cy.elements().removeClass('dimmed').removeClass('search-match');
      return;
    }
    if (currentLevel === 'symbols') {
      // Go back to files view
      if (currentSubdir !== null) drillToSubdir(currentModule, currentSubdir);
      else drillToModule(currentModule);
    } else if (currentLevel === 'files') {
      // Go back to parent subdir or module
      if (currentSubdir) {
        const parentPath = currentSubdir.includes('/') ? currentSubdir.substring(0, currentSubdir.lastIndexOf('/')) : null;
        drillToNestedDir(currentModule, parentPath);
      } else {
        drillToModule(currentModule);
      }
    } else if (currentLevel === 'subdirs') {
      // Go up one nested level, or back to modules
      if (currentSubdir) {
        const parentPath = currentSubdir.includes('/') ? currentSubdir.substring(0, currentSubdir.lastIndexOf('/')) : null;
        if (parentPath) drillToNestedDir(currentModule, parentPath);
        else drillToModule(currentModule);
      } else {
        renderModuleView();
      }
    }
  }
  if (e.key === '/' && document.activeElement !== searchBox && document.activeElement !== document.getElementById('global-search-input')) { e.preventDefault(); searchBox.focus(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openGlobalSearch(); }
  if (e.key === 'Escape' && document.getElementById('code-popup-overlay').style.display === 'block') { closeCodePopup(); return; }
  if (e.key === 'Escape' && document.getElementById('global-search-overlay').style.display === 'block') { closeGlobalSearch(); return; }
});

function escHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return (s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// --- Code preview popup ---
function showCodePopup(sym, file) {
  if (!sym || !sym.source) return;
  document.getElementById('code-popup-title').innerHTML =
    `<span class="kind kind-${sym.kind}" style="font-size:11px;margin-right:6px">${sym.kind}</span>${escHtml(sym.name)}`;
  document.getElementById('code-popup-meta').textContent =
    `${file.path} : line ${sym.line}` + (sym.returnType ? ` → ${sym.returnType}` : '');

  // Render source with line numbers
  const srcLines = sym.source.split('\n');
  const startLine = sym.line;
  let html = '';
  for (let i = 0; i < srcLines.length; i++) {
    const lineNo = startLine + i;
    html += `<span class="line-num">${lineNo}</span>${escHtml(srcLines[i])}\n`;
  }
  document.getElementById('code-popup-code').innerHTML = html;
  document.getElementById('code-popup-overlay').style.display = 'block';
}

function closeCodePopup() {
  document.getElementById('code-popup-overlay').style.display = 'none';
}

// --- Global search ---
const allFilesFlat = [...(DATA.rootFiles || []), ...(DATA.modules || []).flatMap(m => m.files)];
const allSymbolsFlat = [];
for (const f of allFilesFlat) {
  const modName = DATA.modules.find(m => m.files.includes(f))?.name || 'root';
  for (const s of (f.symbols || [])) {
    if (s.exported) allSymbolsFlat.push({ ...s, filePath: f.path, fileName: f.name, moduleName: modName });
  }
}

function openGlobalSearch() {
  const overlay = document.getElementById('global-search-overlay');
  overlay.style.display = 'block';
  const input = document.getElementById('global-search-input');
  input.value = '';
  input.focus();
  document.getElementById('global-search-results').innerHTML = '<div class="search-section-title">Type to search files and symbols across the project</div>';
}
function closeGlobalSearch() {
  document.getElementById('global-search-overlay').style.display = 'none';
}

function navigateToFile(filePath) {
  // Find which module this file belongs to
  for (const mod of DATA.modules) {
    const file = mod.files.find(f => f.path === filePath);
    if (file) {
      currentModule = mod.name;
      currentSubdir = null;
      drillToSymbols(filePath);
      closeGlobalSearch();
      return;
    }
  }
  const rootFile = DATA.rootFiles.find(f => f.path === filePath);
  if (rootFile) {
    currentModule = 'root';
    currentSubdir = null;
    drillToSymbols(filePath);
    closeGlobalSearch();
  }
}

document.getElementById('global-search-input').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  const results = document.getElementById('global-search-results');
  if (!q) {
    results.innerHTML = '<div class="search-section-title">Type to search files and symbols across the project</div>';
    return;
  }

  let html = '';

  // Search files
  const matchedFiles = allFilesFlat.filter(f =>
    f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q)
  ).slice(0, 10);

  if (matchedFiles.length > 0) {
    html += '<div class="search-section-title">Files</div>';
    for (const f of matchedFiles) {
      const badges = [];
      if (f.isEntryPoint) badges.push('<span class="badge badge-entry">entry</span>');
      if (f.importedByCount > 10) badges.push('<span class="badge badge-hot">' + f.importedByCount + 'x imported</span>');
      html += `<div class="search-result-item" onclick="navigateToFile('${escJs(f.path)}')">
        <div class="search-result-name">${escHtml(f.name)} ${badges.join(' ')}</div>
        <div class="search-result-path">${escHtml(f.path)} &middot; ${f.lineCount} lines, ${f.symbols.length} symbols</div>
      </div>`;
    }
  }

  // Search symbols
  const matchedSymbols = allSymbolsFlat.filter(s =>
    s.name.toLowerCase().includes(q)
  ).slice(0, 15);

  if (matchedSymbols.length > 0) {
    html += '<div class="search-section-title">Symbols</div>';
    for (const s of matchedSymbols) {
      html += `<div class="search-result-item" onclick="navigateToFile('${escJs(s.filePath)}')">
        <div><span class="search-result-kind kind-${s.kind}">${s.kind}</span><span class="search-result-name">${escHtml(s.name)}</span></div>
        <div class="search-result-path">${escHtml(s.filePath)} &middot; line ${s.line}</div>
      </div>`;
    }
  }

  // Search modules
  const matchedModules = DATA.modules.filter(m =>
    m.name.toLowerCase().includes(q) || (m.description || '').toLowerCase().includes(q)
  ).slice(0, 5);

  if (matchedModules.length > 0) {
    html += '<div class="search-section-title">Modules</div>';
    for (const m of matchedModules) {
      html += `<div class="search-result-item" onclick="closeGlobalSearch();drillToModule('${escJs(m.name)}')">
        <div class="search-result-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${getColor(m.name)};margin-right:6px"></span>${escHtml(m.name)}</div>
        <div class="search-result-path">${escHtml(m.description)}</div>
      </div>`;
    }
  }

  if (!html) html = '<div class="search-section-title">No results</div>';
  results.innerHTML = html;
});

// --- Init ---
initCy();
renderModuleView();
</script>
</body>
</html>
